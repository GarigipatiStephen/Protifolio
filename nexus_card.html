    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --theme-color: #0ea5e9;
            --bg-color: #000000;
            --card-bg: #000000;
            --text-primary: #ffffff;
            --text-secondary: #0ea5e9;
            --border-color: var(--theme-color);
            --font-unbounded: "Unbounded", "Unbounded Fallback", ui-sans-serif, system-ui, sans-serif;
        }

        body {
            font-family: var(--font-unbounded);
            overflow: hidden;
        }

        .dynamic-theme-color {
            color: var(--theme-color);
            border-color: var(--theme-color);
        }

        .dynamic-shadow {
            box-shadow: 0 0 20px 8px var(--theme-color);
        }

        .dynamic-shadow-hover:hover {
            box-shadow: 0 0 30px 10px var(--theme-color);
        }

        .dynamic-glow {
            filter: drop-shadow(0 0 2px var(--theme-color));
        }

        .dynamic-glow-hover:hover {
            filter: drop-shadow(0 0 8px var(--theme-color));
        }

        .card-3d {
            position: relative;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid rgba(14, 165, 233, 0.2);
            width: 100%;
            max-width: 430px;
            min-height: 100%;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .skill-tag {
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid var(--theme-color);
            font-family: var(--font-unbounded);
        }

        .skill-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            background: rgba(14, 165, 233, 0.1);
        }

        .social-icon {
            transition: all 0.3s ease;
            position: relative;
        }

        .social-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(14, 14, 14, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            border: 1px solid #272727;
            z-index: 1000;
        }

        .social-icon:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }

        .profile-image {
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            filter: brightness(0.9) contrast(1.2);
        }

        .card-navigation {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 25px;
            color: #FFFFFFB2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: var(--font-unbounded);
        }

        .nav-btn:hover {
            color: rgb(14, 165, 233);
            background: rgba(14, 165, 233, 0.1);
            border-color: rgba(14, 165, 233, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        @media (max-width: 768px) {
            .card-navigation {
                top: 15px;
                left: 15px;
                right: 15px;
                justify-content: center;
            }
            .nav-btn span {
                display: none;
            }
        }

        .card-container {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: loadCardContainer 450ms ease-out 150ms forwards;
        }

        @keyframes loadCardContainer {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
    </style>
</head>

    <script>
        // 3D Hover Effects
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('profileCard');
            
            card.addEventListener('mouseenter', () => {
                card.style.transition = 'all 0.05s ease-out';
            });

            card.addEventListener('mouseleave', () => {
                card.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px) scale(1)';
            });

            card.addEventListener('mousemove', (e) => {
                const cardRect = card.getBoundingClientRect();
                const cardCenterX = cardRect.left + cardRect.width / 2;
                const cardCenterY = cardRect.top + cardRect.height / 2;

                const deltaX = e.clientX - cardCenterX;
                const deltaY = e.clientY - cardCenterY;

                const rotateX = (deltaY / cardRect.height) * -15;
                const rotateY = (deltaX / cardRect.width) * 15;

                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const maxDistance = Math.sqrt(cardRect.width * cardRect.width + cardRect.height * cardRect.height) / 2;
                const proximity = 1 - Math.min(distance / maxDistance, 1);

                const scale = 1 + (proximity * 0.05);
                const translateZ = proximity * 20;

                card.style.transform = `
                    perspective(1000px) 
                    rotateX(${rotateX}deg) 
                    rotateY(${rotateY}deg) 
                    translateZ(${translateZ}px) 
                    scale(${scale})
                `;
            });

            // Ripple effect
            card.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                const rect = card.getBoundingClientRect();
                const size = 60;
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;

                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    background: #0ea5e966;
                    border-radius: 50%;
                    left: ${x}px;
                    top: ${y}px;
                    pointer-events: none;
                    transform: scale(0);
                    z-index: 1000;
                `;

                card.appendChild(ripple);

                ripple.animate([
                    { transform: 'scale(0)', opacity: 1 },
                    { transform: 'scale(4)', opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'ease-out'
                }).onfinish = () => ripple.remove();
            });
        });
    </script>
